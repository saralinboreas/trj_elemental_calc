<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>TRJ API Magra</title>
</head>
<body>
<pre id="json"></pre>

<script type="module">
  import { calculateElementsSimple, calculateElementsOrganized } from './js/api.js';

  const params = new URLSearchParams(location.search);

  const mode = params.get('mode') === 'attack' ? 'attack' : 'defense';

  const elements = (params.get('elements') || '')
    .split(',')
    .map(v => v.trim())
    .filter(Boolean);

  const abilities = (params.get('abilities') || '')
    .split(',')
    .map(v => v.trim())
    .filter(Boolean);

  const simple = params.get('simple') === '1';

  const result = simple
    ? calculateElementsSimple({ mode, elements, abilities })
    : calculateElementsOrganized({ mode, elements, abilities });

  document.body.textContent = JSON.stringify(result, null, 2);
</script>
</body>
</html>
