<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Element.help — Calculadora Elemental</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand-wrap">
      <div class="brand-icon"></div>
      <div>
        <h1>Calculadora Elemental</h1>
        <p>The Relic Journey Project</p>
      </div>
    </div>
    <!-- <button class="menu-btn" type="button" aria-label="Menu">☰</button> -->
  </header>

  <main class="app-shell">
    <section class="mode-strip panel-like">
      <button class="mode-btn active" type="button" id="defenseModeBtn" aria-pressed="true">
        <span class="mode-icon">🛡</span>
        <span>Defesa</span>
      </button>
      <button class="mode-btn" type="button" id="attackModeBtn" aria-pressed="false">
        <span class="mode-icon">⚔</span>
        <span>Ataque</span>
      </button>
      <button class="mode-btn clear-mode" type="button" id="clearBtn">
        <span class="mode-icon">✕</span>
        <span>Limpar</span>
      </button>
    </section>

    <section class="panel selector-panel">
      <div class="panel-header compact-header sticky-subheader">
        <div>
          <h2 id="selectorTitle">Escolha até 2 elementos de defesa</h2>
          <p class="panel-subtitle">Toque em 1 ou 2 elementos para combinar.</p>
        </div>
      </div>
      <div id="selectedBadges" class="selected-badges"></div>
      <div id="elementGrid" class="element-grid"></div>
    </section>

    <section class="panel results-panel">
      <div class="panel-header compact-header sticky-subheader">
        <div>
          <h2 id="resultsTitle">Dano recebido por tipo atacante</h2>
          <p class="panel-subtitle">Fraquezas, resistências, neutros e imunidades.</p>
        </div>
      </div>
      <div id="resultsContainer" class="results-container"></div>
    </section>
  </main>

  <script type="module" src="js/public-api.js"></script>
  <script type="module" src="js/app.js"></script>
</body>
</html>
