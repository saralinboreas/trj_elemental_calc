<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Element.help API</title>
</head>

<body>

<pre id="json"></pre>

<script type="module">

import { buildCalculationPayload } from "./js/calculator.js";

const params = new URLSearchParams(location.search);

const mode =
  params.get("mode") === "attack"
  ? "attack"
  : "defense";

const elements =
  (params.get("elements") || "")
  .split(",")
  .map(e => e.trim())
  .filter(Boolean);

const abilities =
  (params.get("abilities") || "")
  .split(",")
  .map(e => e.trim())
  .filter(Boolean);

const result = buildCalculationPayload(
  mode,
  elements,
  abilities
);

const json = JSON.stringify(result, null, 2);

document.body.innerText = json;

</script>

</body>
</html>
